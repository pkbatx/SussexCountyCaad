openapi: 3.0.3
info:
  title: SussexCountyCAAD Local API
  version: 0.1.0
  description: Local-only API for calls, incidents, and processing visibility.
servers:
  - url: http://localhost:3000
paths:
  /api/health:
    get:
      summary: Health check
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
  /api/calls:
    get:
      summary: List calls
      parameters:
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: q
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
        - in: query
          name: offset
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Call list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CallList'
  /api/calls/{callId}:
    get:
      summary: Call detail
      parameters:
        - in: path
          name: callId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Call detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CallDetail'
  /api/calls/{callId}/retry:
    post:
      summary: Retry a call stage
      parameters:
        - in: path
          name: callId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                stage:
                  type: string
                  description: Stage name to retry
      responses:
        '200':
          description: Updated stage status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StageStatus'
  /api/incidents:
    get:
      summary: List incidents
      parameters:
        - in: query
          name: q
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
        - in: query
          name: offset
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Incident list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IncidentList'
  /api/incidents/{incidentId}:
    get:
      summary: Incident detail
      parameters:
        - in: path
          name: incidentId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Incident detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IncidentDetail'
  /api/notifications:
    get:
      summary: Notification history
      parameters:
        - in: query
          name: subjectType
          schema:
            type: string
            enum: [call, incident]
        - in: query
          name: subjectId
          schema:
            type: string
      responses:
        '200':
          description: Notification list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationList'
components:
  schemas:
    CallList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Call'
        total:
          type: integer
    Call:
      type: object
      properties:
        callId:
          type: string
        sourcePath:
          type: string
        status:
          type: string
        firstSeenAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CallDetail:
      type: object
      properties:
        call:
          $ref: '#/components/schemas/Call'
        stages:
          type: array
          items:
            $ref: '#/components/schemas/StageStatus'
        transcripts:
          type: array
          items:
            $ref: '#/components/schemas/Transcript'
        metadataExtracts:
          type: array
          items:
            $ref: '#/components/schemas/MetadataExtract'
        summaries:
          type: array
          items:
            $ref: '#/components/schemas/Summary'
        locations:
          type: array
          items:
            $ref: '#/components/schemas/LocationCandidate'
        notifications:
          type: array
          items:
            $ref: '#/components/schemas/Notification'
        incidents:
          type: array
          items:
            $ref: '#/components/schemas/IncidentMember'
    StageStatus:
      type: object
      properties:
        stage:
          type: string
        status:
          type: string
        attemptCount:
          type: integer
        lastError:
          type: string
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
    Transcript:
      type: object
      properties:
        transcriptId:
          type: string
        text:
          type: string
        confidence:
          type: number
        createdAt:
          type: string
          format: date-time
    MetadataExtract:
      type: object
      properties:
        extractId:
          type: string
        schemaVersion:
          type: string
        payload:
          type: object
        createdAt:
          type: string
          format: date-time
    Summary:
      type: object
      properties:
        summaryId:
          type: string
        subjectType:
          type: string
          enum: [call, incident]
        text:
          type: string
        createdAt:
          type: string
          format: date-time
    IncidentList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Incident'
        total:
          type: integer
    Incident:
      type: object
      properties:
        incidentId:
          type: string
        normalizedAddress:
          type: string
        groupConfidence:
          type: number
        updatedAt:
          type: string
          format: date-time
    IncidentDetail:
      type: object
      properties:
        incident:
          $ref: '#/components/schemas/Incident'
        members:
          type: array
          items:
            $ref: '#/components/schemas/IncidentMember'
        summaries:
          type: array
          items:
            $ref: '#/components/schemas/Summary'
        locations:
          type: array
          items:
            $ref: '#/components/schemas/LocationCandidate'
        notifications:
          type: array
          items:
            $ref: '#/components/schemas/Notification'
    IncidentMember:
      type: object
      properties:
        callId:
          type: string
        linkReason:
          type: string
        linkConfidence:
          type: number
    LocationCandidate:
      type: object
      properties:
        locationId:
          type: string
        rawText:
          type: string
        normalizedText:
          type: string
        confidence:
          type: number
        geocode:
          type: object
    NotificationList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Notification'
        total:
          type: integer
    Notification:
      type: object
      properties:
        notificationId:
          type: string
        channel:
          type: string
        status:
          type: string
        sentAt:
          type: string
          format: date-time
        errorDetail:
          type: string
