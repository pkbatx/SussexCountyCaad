openapi: 3.0.3
info:
  title: SussexCountyCAAD Normalized Fields API
  version: 0.1.0
servers:
  - url: http://localhost:3000
paths:
  /api/calls:
    get:
      summary: List calls with normalized operator fields
      parameters:
        - $ref: "#/components/parameters/start"
        - $ref: "#/components/parameters/end"
        - $ref: "#/components/parameters/incidentType"
        - $ref: "#/components/parameters/jurisdiction"
        - $ref: "#/components/parameters/status"
        - $ref: "#/components/parameters/agency"
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/offset"
      responses:
        "200":
          description: Call list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CallListResponse"

  /api/calls/{callId}:
    get:
      summary: Get call detail with normalized operator fields
      parameters:
        - name: callId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Call detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CallDetailResponse"

  /api/incidents:
    get:
      summary: List incidents with normalized operator fields
      parameters:
        - $ref: "#/components/parameters/start"
        - $ref: "#/components/parameters/end"
        - $ref: "#/components/parameters/incidentType"
        - $ref: "#/components/parameters/jurisdiction"
        - $ref: "#/components/parameters/status"
        - $ref: "#/components/parameters/agency"
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/offset"
      responses:
        "200":
          description: Incident list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IncidentListResponse"

  /api/incidents/{incidentId}:
    get:
      summary: Get incident detail with normalized operator fields
      parameters:
        - name: incidentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Incident detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IncidentDetailResponse"

  /api/agencies:
    get:
      summary: List canonical agency registry entries
      parameters:
        - $ref: "#/components/parameters/q"
      responses:
        "200":
          description: Agency registry
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Agency"

  /api/debug/calls/{callId}:
    get:
      summary: Debug-only call metadata (confidence/evidence)
      parameters:
        - name: callId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Debug metadata payload
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

components:
  parameters:
    start:
      name: start
      in: query
      schema:
        type: string
        format: date-time
    end:
      name: end
      in: query
      schema:
        type: string
        format: date-time
    incidentType:
      name: incident_type
      in: query
      schema:
        type: string
    jurisdiction:
      name: jurisdiction
      in: query
      schema:
        type: string
    status:
      name: status
      in: query
      schema:
        type: string
    agency:
      name: agency
      in: query
      schema:
        type: string
    limit:
      name: limit
      in: query
      schema:
        type: integer
        default: 50
    offset:
      name: offset
      in: query
      schema:
        type: integer
        default: 0
    q:
      name: q
      in: query
      schema:
        type: string

  schemas:
    CallSummary:
      type: object
      properties:
        call_id: { type: string }
        agency: { type: string, nullable: true }
        incident_type: { type: string, nullable: true }
        address: { type: string, nullable: true }
        town: { type: string, nullable: true }
        cross_street: { type: string, nullable: true }
        poi: { type: string, nullable: true }
        summary: { type: string, nullable: true }
        status: { type: string }
        first_seen_at: { type: string, format: date-time }
    CallListResponse:
      type: object
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/CallSummary" }
        total:
          type: integer
    CallDetailResponse:
      type: object
      properties:
        call: { $ref: "#/components/schemas/CallSummary" }
        stages:
          type: array
          items:
            type: object
            properties:
              stage_name: { type: string }
              status: { type: string }

    IncidentSummary:
      type: object
      properties:
        incident_id: { type: string }
        agency: { type: string, nullable: true }
        incident_type: { type: string, nullable: true }
        address: { type: string, nullable: true }
        town: { type: string, nullable: true }
        cross_street: { type: string, nullable: true }
        summary: { type: string, nullable: true }
        status: { type: string, nullable: true }
        last_updated_at: { type: string, format: date-time, nullable: true }
        member_count: { type: integer }
    IncidentListResponse:
      type: object
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/IncidentSummary" }
        total:
          type: integer
    IncidentDetailResponse:
      type: object
      properties:
        incident: { $ref: "#/components/schemas/IncidentSummary" }
        members:
          type: array
          items:
            type: object
            properties:
              call_id: { type: string }
              link_reason: { type: string, nullable: true }

    Agency:
      type: object
      properties:
        agency_id: { type: string }
        canonical_name: { type: string }
        service_type: { type: string, nullable: true }
        last_seen_at: { type: string, format: date-time, nullable: true }
