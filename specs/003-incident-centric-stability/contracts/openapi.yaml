openapi: 3.0.3
info:
  title: SussexCountyCAAD Incident-Centric API
  version: 1.0.0
  description: Contracts for incident-centric views, rollups, and call detail.
servers:
  - url: http://localhost:3000
paths:
  /incidents:
    get:
      summary: List incidents
      parameters:
        - in: query
          name: updated_since
          schema:
            type: string
            format: date-time
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 500
      responses:
        '200':
          description: Incident list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/IncidentSummary'
  /incidents/{incidentId}:
    get:
      summary: Get incident detail
      parameters:
        - in: path
          name: incidentId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Incident detail with rollups and grouping decisions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IncidentDetail'
  /calls:
    get:
      summary: List calls
      parameters:
        - in: query
          name: created_since
          schema:
            type: string
            format: date-time
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 500
      responses:
        '200':
          description: Call list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CallSummary'
  /calls/{callId}:
    get:
      summary: Get call detail
      parameters:
        - in: path
          name: callId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Call detail with extraction and grouping decision
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CallDetail'
components:
  schemas:
    IncidentSummary:
      type: object
      properties:
        incident_id:
          type: string
        updated_at:
          type: string
          format: date-time
        requires_review:
          type: boolean
        summary:
          type: string
      required: [incident_id, updated_at]
    IncidentDetail:
      type: object
      properties:
        incident_id:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        rollups:
          type: array
          items:
            $ref: '#/components/schemas/RollupVersion'
        grouping_decisions:
          type: array
          items:
            $ref: '#/components/schemas/GroupingDecision'
        member_calls:
          type: array
          items:
            $ref: '#/components/schemas/CallSummary'
      required: [incident_id, created_at, updated_at]
    RollupVersion:
      type: object
      properties:
        rollup_version:
          type: integer
        created_at:
          type: string
          format: date-time
        summary:
          type: string
        key_fields:
          type: object
      required: [rollup_version, created_at]
    GroupingDecision:
      type: object
      properties:
        decision_id:
          type: string
        call_id:
          type: string
        decision:
          type: string
          enum: [new_incident, join_incident, no_grouping]
        confidence:
          type: number
        requires_review:
          type: boolean
        signals:
          type: array
          items:
            $ref: '#/components/schemas/GroupingSignal'
        explanation:
          type: string
        created_at:
          type: string
          format: date-time
      required: [decision_id, call_id, decision, confidence, requires_review]
    GroupingSignal:
      type: object
      properties:
        type:
          type: string
        value:
          type: object
        weight:
          type: number
        evidence:
          type: array
          items:
            $ref: '#/components/schemas/EvidenceSpan'
      required: [type, weight]
    CallSummary:
      type: object
      properties:
        call_id:
          type: string
        created_at:
          type: string
          format: date-time
        incident_id:
          type: string
          nullable: true
      required: [call_id, created_at]
    CallDetail:
      type: object
      properties:
        call_id:
          type: string
        created_at:
          type: string
          format: date-time
        incident_id:
          type: string
          nullable: true
        extraction:
          type: object
        grouping_decision:
          $ref: '#/components/schemas/GroupingDecision'
      required: [call_id, created_at]
    EvidenceSpan:
      type: object
      properties:
        text:
          type: string
        start_char:
          type: integer
        end_char:
          type: integer
      required: [text]
